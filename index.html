<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbangan Digital - Kalkulator Harga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            background: #f0f0f3;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.3px;
        }

        .header .sub {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Result Display - Utama (DI ATAS) */
        .result-main {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 24px;
            border: 2px solid #e8ecff;
            transition: all 0.3s ease;
        }

        .result-main .label {
            font-size: 13px;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .result-main .weight-display {
            font-size: 20px;
            font-weight: 400;
            color: #8e8e93;
            margin: 2px 0 12px 0;
        }

        .result-main .weight-display .weight-value {
            font-weight: 500;
            color: #1a1a1a;
        }

        .result-main .weight-display .weight-unit {
            font-weight: 400;
        }

        .result-main .total-price {
            font-size: 48px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 4px 0 8px 0;
            letter-spacing: -1px;
        }

        .result-main .total-price .currency {
            font-size: 28px;
            font-weight: 500;
            color: #8e8e93;
        }

        .result-main .detail-row {
            display: flex;
            gap: 24px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
        }

        .result-main .detail-item {
            flex: 1;
        }

        .result-main .detail-item .detail-label {
            font-size: 12px;
            color: #8e8e93;
        }

        .result-main .detail-item .detail-value {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-top: 2px;
        }

        .result-main .detail-item .detail-value .currency {
            font-size: 13px;
            font-weight: 400;
            color: #8e8e93;
        }

        /* Input Section (DI BAWAH) */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group label .hint {
            font-weight: 400;
            color: #8e8e93;
            font-size: 12px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #f8f8fa;
            border-radius: 14px;
            border: 1.5px solid #e8e8ec;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: #007aff;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.08);
        }

        .input-wrapper .prefix {
            padding: 0 0 0 16px;
            font-size: 15px;
            font-weight: 500;
            color: #8e8e93;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
            outline: none;
            font-family: inherit;
        }

        .input-wrapper input::placeholder {
            color: #c7c7cc;
            font-weight: 400;
            font-size: 15px;
        }

        .input-wrapper input[type="number"]::-webkit-inner-spin-button,
        .input-wrapper input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-wrapper input[type="number"] {
            -moz-appearance: textfield;
        }

        .input-wrapper .suffix {
            padding: 0 16px 0 0;
            font-size: 14px;
            color: #8e8e93;
            font-weight: 500;
            pointer-events: none;
        }

        /* Quick Buttons */
        .quick-buttons {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 5px 12px;
            border: 1px solid #e8e8ec;
            border-radius: 16px;
            background: #f8f8fa;
            color: #1a1a1a;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .quick-btn:hover {
            background: #f0f0f3;
            border-color: #d0d0d5;
        }

        .quick-btn:active {
            transform: scale(0.95);
        }

        /* Status */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 8px 0;
            font-size: 12px;
            color: #8e8e93;
        }

        .status-bar .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34c759;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* History Toggle Button */
        .history-toggle {
            width: 100%;
            padding: 12px;
            border: none;
            background: #f8f8fa;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            font-family: inherit;
            border: 1px solid #f0f0f2;
        }

        .history-toggle:hover {
            background: #f0f0f3;
        }

        .history-toggle .arrow {
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .history-toggle .arrow.open {
            transform: rotate(180deg);
        }

        /* History Section - Tertutup */
        .history-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, margin 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }

        .history-section.open {
            max-height: 400px;
            opacity: 1;
            margin-top: 16px;
        }

        .history-content {
            background: #f8f8fa;
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid #f0f0f2;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-header h3 {
            font-size: 13px;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-header button {
            background: none;
            border: none;
            color: #007aff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .history-header button:hover {
            background: #f0f0f3;
        }

        .history-list {
            max-height: 240px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar {
            width: 3px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #d0d0d5;
            border-radius: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f2;
            font-size: 14px;
            animation: slideUp 0.25s ease;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .item-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .history-item .item-weight {
            font-weight: 500;
            color: #1a1a1a;
        }

        .history-item .item-price {
            color: #8e8e93;
            font-size: 13px;
        }

        .history-item .item-total {
            font-weight: 600;
            color: #1a1a1a;
        }

        .history-item .item-total .currency {
            font-weight: 400;
            color: #8e8e93;
            font-size: 12px;
        }

        .empty-history {
            text-align: center;
            padding: 16px 0;
            color: #c7c7cc;
            font-size: 14px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 24px 16px;
                border-radius: 24px;
            }

            .result-main .total-price {
                font-size: 36px;
            }

            .result-main .total-price .currency {
                font-size: 22px;
            }

            .result-main .detail-row {
                flex-direction: column;
                gap: 8px;
            }

            .result-main .detail-item .detail-value {
                font-size: 16px;
            }

            .result-main .weight-display {
                font-size: 17px;
            }
        }

        @media (max-width: 380px) {
            .quick-buttons {
                gap: 4px;
            }

            .quick-btn {
                font-size: 11px;
                padding: 4px 10px;
            }

            .result-main .total-price {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">⚖️</div>
            <div>
                <h1>Timbangan Digital</h1>
                <div class="sub">Kalkulator harga otomatis</div>
            </div>
        </div>

        <!-- Result Display - Utama (DI ATAS) -->
        <div class="result-main">
            <div class="label">Berat & Total Harga</div>
            <div class="weight-display">
                <span class="weight-value" id="weightDisplay">1,000</span>
                <span class="weight-unit" id="weightUnitDisplay">kg</span>
                <span style="color: #d0d0d5; margin: 0 8px;">·</span>
                <span id="weightInOns" style="color: #8e8e93;">10 ons</span>
            </div>
            <div class="total-price" id="displayTotal">
                <span class="currency">Rp</span> 20.000
            </div>
            <div class="detail-row">
                <div class="detail-item">
                    <div class="detail-label">Harga per Kg</div>
                    <div class="detail-value" id="displayPerKg">
                        <span class="currency">Rp</span> 20.000
                    </div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Harga per Ons</div>
                    <div class="detail-value" id="displayPerOns">
                        <span class="currency">Rp</span> 2.000
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Section (DI BAWAH) -->
        <div class="input-section">
            <!-- Input Berat (DI ATAS) -->
            <div class="input-group">
                <label>
                    Berat Barang
                    <span class="hint">(kg)</span>
                </label>
                <div class="input-wrapper">
                    <input type="number" id="weightInput" placeholder="0,200" step="0.001" min="0" value="1">
                    <span class="suffix">kg</span>
                </div>
                <div class="quick-buttons">
                    <button class="quick-btn" onclick="setWeight(0.05)">0,05 kg</button>
                    <button class="quick-btn" onclick="setWeight(0.1)">0,1 kg</button>
                    <button class="quick-btn" onclick="setWeight(0.2)">0,2 kg</button>
                    <button class="quick-btn" onclick="setWeight(0.5)">0,5 kg</button>
                    <button class="quick-btn" onclick="setWeight(1)">1 kg</button>
                    <button class="quick-btn" onclick="setWeight(2)">2 kg</button>
                    <button class="quick-btn" onclick="setWeight(5)">5 kg</button>
                </div>
            </div>

            <!-- Input Harga (DI BAWAH) -->
            <div class="input-group">
                <label>
                    Harga per Kilogram
                    <span class="hint">(Rp)</span>
                </label>
                <div class="input-wrapper">
                    <span class="prefix">Rp</span>
                    <input type="number" id="priceInput" placeholder="20.000" step="100" min="0" value="20000">
                </div>
                <div class="quick-buttons">
                    <button class="quick-btn" onclick="setPrice(15000)">Rp 15K</button>
                    <button class="quick-btn" onclick="setPrice(20000)">Rp 20K</button>
                    <button class="quick-btn" onclick="setPrice(25000)">Rp 25K</button>
                    <button class="quick-btn" onclick="setPrice(30000)">Rp 30K</button>
                    <button class="quick-btn" onclick="setPrice(50000)">Rp 50K</button>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="status-bar">
            <span class="dot"></span>
            <span>Realtime</span>
            <span style="margin-left: auto;" id="lastUpdate">siap</span>
        </div>

        <!-- History Toggle Button -->
        <button class="history-toggle" onclick="toggleHistory()">
            <span>📋 Riwayat</span>
            <span class="arrow" id="historyArrow">▾</span>
        </button>

        <!-- History Section - Tertutup -->
        <div class="history-section" id="historySection">
            <div class="history-content">
                <div class="history-header">
                    <h3>📋 Riwayat Transaksi</h3>
                    <button onclick="clearHistory()">Hapus semua</button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="empty-history">Belum ada transaksi</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        let updateTimeout;
        let historyOpen = false;

        // Format Rupiah
        function formatRupiah(num) {
            return num.toLocaleString('id-ID', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
        }

        // Format angka dengan desimal
        function formatNumber(num, decimals = 0) {
            return num.toLocaleString('id-ID', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }

        // Hitung
        function calculate() {
            const pricePerKg = parseFloat(document.getElementById('priceInput').value);
            const weightKg = parseFloat(document.getElementById('weightInput').value);

            // Validasi
            if (isNaN(pricePerKg) || pricePerKg <= 0) {
                document.getElementById('displayPerKg').innerHTML = '<span class="currency">Rp</span> 0';
                document.getElementById('displayPerOns').innerHTML = '<span class="currency">Rp</span> 0';
                document.getElementById('displayTotal').innerHTML = '<span class="currency">Rp</span> 0';
                document.getElementById('weightDisplay').textContent = '0,000';
                document.getElementById('weightInOns').textContent = '0 ons';
                return;
            }

            if (isNaN(weightKg) || weightKg <= 0) {
                document.getElementById('displayPerKg').innerHTML = `<span class="currency">Rp</span> ${formatRupiah(pricePerKg)}`;
                document.getElementById('displayPerOns').innerHTML = `<span class="currency">Rp</span> ${formatRupiah(pricePerKg / 10)}`;
                document.getElementById('displayTotal').innerHTML = '<span class="currency">Rp</span> 0';
                document.getElementById('weightDisplay').textContent = '0,000';
                document.getElementById('weightInOns').textContent = '0 ons';
                return;
            }

            // Konversi
            const perOns = pricePerKg / 10;
            const totalPrice = pricePerKg * weightKg;
            const weightOns = weightKg * 10;

            // Update display berat
            const weightStr = weightKg.toString();
            let displayWeight;
            if (weightStr.includes('.')) {
                const parts = weightStr.split('.');
                displayWeight = `${parts[0]},${parts[1].padEnd(3, '0').slice(0, 3)}`;
            } else {
                displayWeight = `${weightStr},000`;
            }
            document.getElementById('weightDisplay').textContent = displayWeight;
            document.getElementById('weightInOns').textContent = `${formatNumber(weightOns, 1)} ons`;

            // Update hasil
            document.getElementById('displayPerKg').innerHTML = `<span class="currency">Rp</span> ${formatRupiah(pricePerKg)}`;
            document.getElementById('displayPerOns').innerHTML = `<span class="currency">Rp</span> ${formatRupiah(perOns)}`;
            document.getElementById('displayTotal').innerHTML = `<span class="currency">Rp</span> ${formatRupiah(totalPrice)}`;

            // Update status
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('id-ID');

            // Tambah ke riwayat (debounce)
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
                addHistory(pricePerKg, weightKg, totalPrice, perOns);
            }, 600);
        }

        function addHistory(pricePerKg, weightKg, totalPrice, perOns) {
            const item = {
                pricePerKg: pricePerKg,
                weightKg: weightKg,
                total: totalPrice,
                perOns: perOns,
                time: new Date().toLocaleTimeString('id-ID')
            };

            // Cek duplicate
            if (history.length > 0) {
                const last = history[0];
                if (last.pricePerKg === item.pricePerKg && 
                    last.weightKg === item.weightKg && 
                    last.total === item.total) {
                    return;
                }
            }

            history.unshift(item);
            if (history.length > 20) history.pop();
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<div class="empty-history">Belum ada transaksi</div>';
                return;
            }

            list.innerHTML = history.map(item => {
                const weightDisplay = item.weightKg >= 1 ? 
                    `${formatNumber(item.weightKg, 3)} kg` : 
                    `${formatNumber(item.weightKg * 10, 1)} ons`;
                return `
                    <div class="history-item">
                        <div class="item-info">
                            <span class="item-weight">${weightDisplay}</span>
                            <span class="item-price">@ Rp ${formatRupiah(item.pricePerKg)}/kg</span>
                        </div>
                        <span class="item-total">
                            <span class="currency">Rp</span> ${formatRupiah(item.total)}
                        </span>
                    </div>
                `;
            }).join('');
        }

        function toggleHistory() {
            historyOpen = !historyOpen;
            const section = document.getElementById('historySection');
            const arrow = document.getElementById('historyArrow');
            
            if (historyOpen) {
                section.classList.add('open');
                arrow.classList.add('open');
            } else {
                section.classList.remove('open');
                arrow.classList.remove('open');
            }
        }

        function clearHistory() {
            history = [];
            renderHistory();
        }

        // Shortcut functions
        function setPrice(value) {
            document.getElementById('priceInput').value = value;
            calculate();
        }

        function setWeight(value) {
            document.getElementById('weightInput').value = value;
            calculate();
        }

        // Event listeners
        document.getElementById('priceInput').addEventListener('input', calculate);
        document.getElementById('weightInput').addEventListener('input', calculate);

        // Keyboard shortcut: Enter untuk pindah
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active.id === 'weightInput') {
                    document.getElementById('priceInput').focus();
                    document.getElementById('priceInput').select();
                } else if (active.id === 'priceInput') {
                    document.getElementById('priceInput').select();
                }
            }
        });

        // Inisialisasi
        window.addEventListener('load', function() {
            calculate();
            document.getElementById('weightInput').focus();
            document.getElementById('weightInput').select();
        });
    </script>
</body>
</html>
